{% extends 'base.html' %}
{% load static %}
{% block content %}
<form method="post">
  {% csrf_token %}
  <p>Are you sure you want to delete this {{item}}?</p>
  <form action="{% url 'delete' item.id %}" method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
{% endblock %}
